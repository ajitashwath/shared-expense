version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: shared_expense_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shared_expenses
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shared_expense_api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/shared_expenses
      SECRET_KEY: change-this-in-production-super-secret-key-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: '["http://localhost:3000"]'
      USD_TO_INR_RATE: "83.50"
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "prisma db push && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shared_expense_ui
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
